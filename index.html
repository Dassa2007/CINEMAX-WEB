<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG URL GENERATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://res.cloudinary.com/dxctmzctl/image/upload/v1776344062/hzrtx64gaii16wztxdag.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 2.5rem 1.5rem; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* File Upload Box Fix */
        .upload-box {
            border: 2px dashed rgba(255,255,255,0.5);
            padding: 30px 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            overflow: hidden; /* පිටතට යාම වැළැක්වීමට */
        }

        .custom-file-label { 
            color: #eee; 
            font-weight: 500;
            display: block;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; /* දිග නම මැදින් කපා ඉවත් කිරීමට */
            padding: 0 10px;
        }

        .upload-box i { font-size: 35px; color: #fff; display: block; margin-bottom: 10px; }
        input[type="file"] { display: none; }

        .btn-generate { 
            background: #6c5ce7; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            width: 100%;
            transition: 0.4s; 
        }

        /* Popup Styles */
        #resultPopup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            width: 85%;
            max-width: 380px;
            text-align: center;
        }

        #urlOutput { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 10px; margin: 15px 0; font-size: 13px;
        }

        .btn-copy { 
            background: #00b894; color: white; border: none; 
            padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 999;
        }

        /* Toast Notification - Alert close */
        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: #333; color: #fff;
            padding: 10px 20px; border-radius: 50px;
            font-size: 14px; display: none; z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .spinner {
            display: none; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #fff; border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="title">DG URL GENERATOR</div>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <i>📁</i>
        <div class="custom-file-label" id="fileName">Choose Image, Video or Audio</div>
        <input type="file" id="fileInput" onchange="updateFileName()">
    </div>

    <button onclick="uploadFile()" id="uploadBtn" class="btn-generate">GENERATE URL</button>
    <div id="loader" class="spinner"></div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div id="resultPopup">
    <h3 style="margin:0; color:#333">✅ Link Generated!</h3>
    <input type="text" id="urlOutput" readonly>
    <button onclick="copyURL()" class="btn-copy">COPY URL</button>
    <p onclick="closePopup()" style="margin-top:15px; color:#999; cursor:pointer; font-size:14px">Close</p>
</div>

<div id="toast" class="toast">Link copied to clipboard!</div>

<script>
    const CLOUD_NAME = "dxctmzctl";
    const UPLOAD_PRESET = "Dg_project";

    function updateFileName() {
        const input = document.getElementById('fileInput');
        const label = document.getElementById('fileName');
        if (input.files.length > 0) {
            label.innerText = input.files[0].name;
            label.style.color = "#6c5ce7";
        }
    }

    async function uploadFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) { alert("Please select a file!"); return; }

        document.getElementById('uploadBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.secure_url) {
                document.getElementById('urlOutput').value = data.secure_url;
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('resultPopup').style.display = 'block';
            }
        } catch (e) { alert("Upload failed!"); }
        finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('uploadBtn').style.display = 'block';
        }
    }

    function copyURL() {
        const urlOutput = document.getElementById('urlOutput');
        urlOutput.select();
        document.execCommand('copy');
        
        // Alert or
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('resultPopup').style.display = 'none';
    }
</script>

</body>
</html>
